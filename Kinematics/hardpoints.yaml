# Chassis Coordinate System:
# Origin at center of rear axle on ground plane
# X - Forward
# Y - Left
# Z - Up
# [X, Y, Z]

# Suspension Geometry for Front Right (FR)
# Front left will be same with all y components signs flipped
front_right:
  # Chassis Pickups (Fixed)
  upper_wishbone:
    front: [1.7916, -0.2597, 0.3157]
    rear:  [1.5221, -0.2597, 0.3157]
    balljoint_0: [1.511, -0.5332, 0.3213]

  lower_wishbone:
    front: [1.7916, -0.2216, 0.1354]
    rear:  [1.5221, -0.2216, 0.1354]
    balljoint_0: [1.5367, -0.5629, 0.1338]

  # Upright/Knuckle Geometry
  upright:
    upper_balljoint_0: [1.511, -0.5332, 0.3213]
    lower_balljoint_0: [1.5367, -0.5629, 0.1338]
    toe_link_0: [1.600, -0.5892, 0.1852]
    axle_root_0: [1.5367, -0.6191, 0.2288]
    axle_tip_0: [1.5367, -0.7207, 0.2306]
    wheel_radius: 0.2286

  # Steering/Toe Constraints
  steering:
    rack_end_0: [1.6129, -0.2286, 0.1862]
    tie_rod_length: 0.3608

  # side sign for fixing sign errors in measurements
  side_sign: -1.0

# Suspension Geometry for Rear Right (RR)
rear_right:
  # Chassis Pickups (Fixed)
  upper_wishbone:
    front: [0.3264, -0.3137, 0.3302]
    rear:  [0.0772, -0.3137, 0.3302]
    balljoint_0: [0.0536, -0.5022, 0.3208]

  lower_wishbone:
    front: [0.3264, -0.3137, 0.1524]
    rear:  [0.0343, -0.3137, 0.1524]
    balljoint_0: [0.0154, -0.5354, 0.1328]

  # Upright/Knuckle Geometry (Relative to balljoints)
  upright:
    upper_balljoint_0: [0.0536, -0.5022, 0.3208]
    lower_balljoint_0: [0.0154, -0.5354, 0.1328]
    toe_link_0: [-0.0559, -0.5022, 0.3208]
    axle_root_0: [0.0, -0.5955, 0.2286]
    axle_tip_0: [0.0, -0.6985, 0.2286]
    wheel_radius: 0.2286

  # Steering/Toe Constraints
  steering:
    rack_end_0: [-0.0038, -0.3137, 0.3302]
    tie_rod_length: 0.1958

  # side sign for fixing sign errors in measurements
  side_sign: -1.0